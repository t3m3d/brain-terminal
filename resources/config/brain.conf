# brain — terminal configuration
#
# Search order (first hit wins):
#   $XDG_CONFIG_HOME/brain/brain.conf  (POSIX: ~/.config/brain/brain.conf)
#   %APPDATA%\brain\brain.conf         (Windows)
#   ./brain.conf                       (cwd when brain was launched)
#   resources/config/brain.conf        (this file — built-in defaults)
#
# Lines starting with # are comments. Format: key = value
# Values may be quoted ("..." or '...') to preserve leading/trailing spaces.

# ── shell ────────────────────────────────────────────────────────────
# The child process brain spawns inside the PTY.
#   /bin/bash   POSIX default; on Windows the PTY backend silently
#               substitutes cmd.exe (see platform/windows/PTYPlatform.cpp).
#   pwsh.exe                     PowerShell 7+
#   "C:\\krypton\\kr.exe"        Krypton's KryptScript REPL
shell = /bin/bash

# ── font ─────────────────────────────────────────────────────────────
# Pick a real monospace family. Nerd Font variants (CaskaydiaCove NF,
# JetBrainsMono NF, FiraCode NF) render Powerline / oh-my-posh icons.
#   Windows:  Cascadia Mono, CaskaydiaCove Nerd Font Mono, Consolas
#   macOS:    Menlo, Monaco, JetBrainsMono Nerd Font Mono
#   Linux:    DejaVu Sans Mono, JetBrainsMono Nerd Font Mono
#
# Brain auto-falls-back to an installed monospace if this family is
# missing — without that fallback Qt picks a proportional font and the
# cell grid looks "M i c r o s o f t".
font_family = Cascadia Mono
font_size   = 14

# ── colors / theme ───────────────────────────────────────────────────
# Path is relative to brain's launch directory (the install ships
# default + a couple alternates under resources/themes/).
theme = resources/themes/default.json

# ── window ───────────────────────────────────────────────────────────
window_width  = 1333
window_height = 640

# ── opacity ──────────────────────────────────────────────────────────
# Percent. 100 = fully opaque. On Hyprland / any Wayland compositor the
# background blends with whatever is behind the window. Below ~70 is hard
# to read against busy wallpapers.
opacity = 100

# ── padding ──────────────────────────────────────────────────────────
# Inner gap in pixels between the window edge and the text grid.
padding_x = 6
padding_y = 4

# ── colours ──────────────────────────────────────────────────────────
# Hex, #RRGGBB or #AARRGGBB. Leave a key out to keep the theme/default.
#   foreground             default text colour
#   background             default background (opacity above is applied to it)
#   cursor_color           the cursor block/bar/underline
#   selection_background   highlight behind selected text
#   selection_foreground   text colour inside a selection
# foreground           = #c0caf5
# background           = #1a1b26
# cursor_color         = #c0caf5
# selection_background = #283457
# selection_foreground = #c0caf5

# The 16 ANSI palette slots (0-7 normal, 8-15 bright). `palette<N> = #hex`
# (or `color<N>`). Example below is Tokyo Night; uncomment to use.
# palette0  = #15161e
# palette1  = #f7768e
# palette2  = #9ece6a
# palette3  = #e0af68
# palette4  = #7aa2f7
# palette5  = #bb9af7
# palette6  = #7dcfff
# palette7  = #a9b1d6
# palette8  = #414868
# palette9  = #f7768e
# palette10 = #9ece6a
# palette11 = #e0af68
# palette12 = #7aa2f7
# palette13 = #bb9af7
# palette14 = #7dcfff
# palette15 = #c0caf5

# ── scrollback ───────────────────────────────────────────────────────
# Lines kept above the visible viewport. Memory cost ≈ 2 KB per 100
# lines for typical terminal widths.
scrollback = 5000

# ── cursor ───────────────────────────────────────────────────────────
# block | underline | bar
cursor_style = block

# ── startup_command ──────────────────────────────────────────────────
# Sent to the shell as if typed at the first prompt. Great for
# fastfetch / neofetch system-info banners, or a pre-tmux wrapper.
# Blank by default. Only set it to something on your PATH, or the shell
# just echoes the word and errors.
#   startup_command = fastfetch
startup_command =

# ── prompt theming (not a brain setting) ─────────────────────────────
# brain renders whatever the shell emits. To get a styled prompt:
#   PowerShell: install oh-my-posh + a Nerd Font + add the init line
#               to your $PROFILE. See https://ohmyposh.dev/.
#   bash/zsh:   install starship + a Nerd Font, then
#               eval "$(starship init bash)" in ~/.bashrc / ~/.zshrc.
# Switching brain's `font_family` above to a Nerd Font is what unlocks
# the powerline / branch / git icons.

# ── keybindings (built in; reference) ─────────────────────────────────
# These are wired into the app (not config keys yet):
#   Ctrl+Shift+C / Ctrl+Shift+V   copy selection / paste
#   Middle click                  paste the primary selection
#   Click + drag                  select text   (Shift+drag if an app grabs
#                                 the mouse, e.g. vim/htop/tmux)
#   Double / triple click         select word / line
#   Mouse wheel                   scroll the scrollback (or the app, if it
#                                 enabled mouse reporting)
#   Ctrl +  /  Ctrl -  /  Ctrl 0  font size bigger / smaller / reset
#   Ctrl+F                        find in scrollback
#   Ctrl+click                    open a URL / OSC 8 hyperlink
#
# Mouse-using TUIs (htop, vim, tmux, less, ranger) work: brain reports the
# mouse via DEC 1000/1002/1003 + SGR 1006.
