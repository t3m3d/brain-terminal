# brain — terminal configuration
#
# Search order (first hit wins):
#   $XDG_CONFIG_HOME/brain/brain.conf  (POSIX: ~/.config/brain/brain.conf)
#   %APPDATA%\brain\brain.conf         (Windows)
#   ./brain.conf                       (cwd when brain was launched)
#   resources/config/brain.conf        (this file — built-in defaults)
#
# Lines starting with # are comments. Format: key = value
# Values may be quoted ("..." or '...') to preserve leading/trailing spaces.
#
# LIVE RELOAD: brain watches this file (and the theme below). Save your edits
# and they apply immediately — no restart needed.

# ── shell ────────────────────────────────────────────────────────────
# The child process brain spawns inside the PTY.
#   /bin/bash   POSIX default; on Windows the PTY backend silently
#               substitutes cmd.exe (see platform/windows/PTYPlatform.cpp).
#   pwsh.exe                     PowerShell 7+
#   "C:\\krypton\\kr.exe"        Krypton's KryptScript REPL
# On Linux a ~/.config/brain-terminal/setup.ks Krypton script, if present,
# can pick the shell dynamically (see krypton/linux/).
shell = /bin/bash

# ── font ─────────────────────────────────────────────────────────────
# Pick a real monospace family. Nerd Font variants (CaskaydiaCove NF,
# JetBrainsMono NF, FiraCode NF) render Powerline / oh-my-posh icons.
#   Windows:  Cascadia Mono, CaskaydiaCove Nerd Font Mono, Consolas
#   macOS:    Menlo, Monaco, JetBrainsMono Nerd Font Mono
#   Linux:    DejaVu Sans Mono, JetBrainsMono Nerd Font Mono
#
# Brain auto-falls-back to an installed monospace if this family is
# missing — without that fallback Qt picks a proportional font and the
# cell grid looks "M i c r o s o f t".
font_family = Cascadia Mono
font_size   = 14

# Base font weight: thin | extralight | light | normal | medium |
# demibold | bold | extrabold | black. (Ctrl +/-/0 resize at runtime.)
font_weight = normal

# use_bold: honour the SGR 1 "bold" attribute by thickening text.
# Set to no if your font has no regular weight and renders permanently bold.
use_bold = yes

# ── theme ────────────────────────────────────────────────────────────
# A bundled theme NAME or a path to a theme .json. Bundled themes live in
# resources/themes/ and ~/.config/brain/themes/:
#   default, gruvbox-dark, tokyo-night, catppuccin-mocha, dracula, nord,
#   solarized-dark, light
# A theme sets foreground/background/cursor/selection and (optionally) the
# full 16-colour ANSI palette. The explicit colour keys below override it.
theme = default

# ── window ───────────────────────────────────────────────────────────
window_width  = 1333
window_height = 640

# ── tabs ─────────────────────────────────────────────────────────────
# auto | on | off.
#   auto  brain enables tabs on stacking desktops (KDE, GNOME, XFCE,
#         Cinnamon, MATE…) and disables them under tiling window managers
#         (Hyprland, sway, i3, river, niri…), where you split with the
#         compositor instead. This is the default.
#   on    always show tabs  (Ctrl+Shift+T new, Ctrl+Shift+W close,
#                            Ctrl+Tab / Ctrl+PgUp/PgDn switch)
#   off   never; those keys pass straight through to the shell.
# When off, the tab bar is gone and brain behaves like a single window.
tabs = auto

# ── opacity ──────────────────────────────────────────────────────────
# Percent. 100 = fully opaque. On Hyprland / any Wayland compositor the
# background blends with whatever is behind the window. Below ~70 is hard
# to read against busy wallpapers.
opacity = 100

# ── padding ──────────────────────────────────────────────────────────
# Inner gap in pixels between the window edge and the text grid.
padding_x = 6
padding_y = 4

# ── colours ──────────────────────────────────────────────────────────
# Hex, #RRGGBB or #AARRGGBB. Leave a key out to keep the theme/default.
# (Apps can also set these at runtime via OSC 10/11/12.)
#   foreground             default text colour
#   background             default background (opacity above is applied to it)
#   cursor_color           the cursor block/bar/underline
#   selection_background   highlight behind selected text
#   selection_foreground   text colour inside a selection
# foreground           = #c0caf5
# background           = #1a1b26
# cursor_color         = #c0caf5
# selection_background = #283457
# selection_foreground = #c0caf5

# The 16 ANSI palette slots (0-7 normal, 8-15 bright). `palette<N> = #hex`
# (or `color<N>`). Overrides the theme's palette. Apps may also recolour
# slots at runtime via OSC 4. Example below is Tokyo Night; uncomment to use.
# palette0  = #15161e
# palette1  = #f7768e
# palette2  = #9ece6a
# palette3  = #e0af68
# palette4  = #7aa2f7
# palette5  = #bb9af7
# palette6  = #7dcfff
# palette7  = #a9b1d6
# palette8  = #414868
# palette9  = #f7768e
# palette10 = #9ece6a
# palette11 = #e0af68
# palette12 = #7aa2f7
# palette13 = #bb9af7
# palette14 = #7dcfff
# palette15 = #c0caf5

# ── scrollback ───────────────────────────────────────────────────────
# Lines kept above the visible viewport. Memory cost ≈ 2 KB per 100
# lines for typical terminal widths.
scrollback = 5000

# Lines moved per mouse-wheel notch when scrolling the scrollback.
scroll_lines = 3

# ── cursor ───────────────────────────────────────────────────────────
# cursor_style:    block | underline | bar
# cursor_blink:    yes | no  (apps can also drive this via DECSCUSR)
# cursor_blink_interval: blink half-period in milliseconds
cursor_style          = block
cursor_blink          = no
cursor_blink_interval = 530

# ── bell ─────────────────────────────────────────────────────────────
# How to react when a program emits BEL (\a):
#   urgent   flash the window / taskbar entry (default)
#   audible  play the system beep
#   none     ignore it
bell = urgent

# ── selection ────────────────────────────────────────────────────────
# Selecting text always copies to the PRIMARY selection (middle-click
# paste). Set copy_on_select = yes to ALSO copy to the clipboard.
copy_on_select = no
# Extra characters (besides whitespace) that break a double-click word
# selection, e.g. word_separators = "/\\.,;:()[]{}".  Empty = whitespace only.
word_separators =

# ── startup_command ──────────────────────────────────────────────────
# Sent to the shell as if typed at the first prompt. Great for
# fastfetch / neofetch system-info banners, or a pre-tmux wrapper.
# Blank by default. Only set it to something on your PATH, or the shell
# just echoes the word and errors.
#   startup_command = fastfetch
startup_command =

# ── prompt theming (not a brain setting) ─────────────────────────────
# brain renders whatever the shell emits. To get a styled prompt:
#   PowerShell: install oh-my-posh + a Nerd Font + add the init line
#               to your $PROFILE. See https://ohmyposh.dev/.
#   bash/zsh:   install starship + a Nerd Font, then
#               eval "$(starship init bash)" in ~/.bashrc / ~/.zshrc.
# Switching brain's `font_family` above to a Nerd Font is what unlocks
# the powerline / branch / git icons.

# ── keybindings (built in; reference) ─────────────────────────────────
# These are wired into the app (not config keys yet):
#   Ctrl+Shift+C / Ctrl+Shift+V   copy selection / paste
#   Middle click                  paste the primary selection
#   Click + drag                  select text   (Shift+drag if an app grabs
#                                 the mouse, e.g. vim/htop/tmux)
#   Double / triple click         select word / line
#   Mouse wheel                   scroll the scrollback (or the app, if it
#                                 enabled mouse reporting)
#   Ctrl +  /  Ctrl -  /  Ctrl 0  font size bigger / smaller / reset
#   Ctrl+F                        find in scrollback
#   Ctrl+click / Ctrl+hover       open / highlight a URL or OSC 8 hyperlink
#
# Supported escapes/protocols: truecolor + 256 colour, bold/italic/inverse/
# strikethrough/dim, styled+coloured underlines (undercurl, SGR 4:3 / 58),
# wide-char + emoji, Sixel inline images, mouse reporting (DEC 1000/1002/1003
# + SGR 1006), focus reporting (1004), bracketed paste, shell integration
# (OSC 133), clipboard (OSC 52), cwd (OSC 7), colour query/set (OSC 4/10/11/12),
# and reflow on resize.
